name: build

# Runs on every PR into main and every push to main. Every correctness
# gate runs here so drift fails loudly without anyone remembering to run
# it locally: style (format:check), types/schema (check), design-token
# sync (check:tokens), layout/colour/filename/order discipline
# (check:discipline), and a full build (missing image, schema mismatch,
# Astro syntax error) before Vercel deploys.

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  # Match package.json engines (>=22.12.0) — Astro 6 requires Node 22+.
                  node-version: '22'
                  cache: 'npm'

            - run: npm ci

            - run: npm run format:check

            - run: npm run check

            - run: npm run check:tokens

            - run: npm run check:discipline

            - run: npm run build
