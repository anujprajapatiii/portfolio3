name: build

# Runs on every PR into main and every push to main, so a broken
# build (missing image, content schema mismatch, Astro syntax error)
# is caught in CI before Vercel deploys.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run check

      - run: npm run build
